<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FilmPro — Recomendações com IA</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Inter', sans-serif; background-color: #050505; }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .animate-in { animation: fadeInUp 0.5s ease both; }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { animation: spin 0.8s linear infinite; }

    @keyframes pulse { 0%,100% { opacity: 0.4; } 50% { opacity: 0.8; } }
    .skeleton { animation: pulse 1.5s ease-in-out infinite; background-color: #1a1a1a; border-radius: 6px; }

    .card { transition: transform 0.2s ease, box-shadow 0.2s ease; }
    .card:hover { transform: translateY(-4px); box-shadow: 0 20px 40px rgba(0,0,0,0.6); }
  </style>
</head>

<body class="min-h-screen text-white bg-[#050505] overflow-x-hidden">

  <!-- Glow de fundo -->
  <div class="fixed inset-0 pointer-events-none z-0">
    <div class="absolute top-0 left-1/2 -translate-x-1/2 w-[800px] h-[500px] bg-orange-900/10 blur-[120px] rounded-full"></div>
  </div>

  <!-- Navbar -->
  <nav class="relative z-10 flex items-center justify-between px-6 py-5 max-w-6xl mx-auto border-b border-white/5">
    <div class="flex items-center gap-2">
      <svg fill="none" height="20" stroke="#f97316" stroke-width="1.6" viewBox="0 0 24 24" width="20">
        <rect width="20" height="20" x="2" y="2" rx="2.18"/>
        <line x1="7" x2="7" y1="2" y2="22"/><line x1="17" x2="17" y1="2" y2="22"/>
        <line x1="2" x2="22" y1="7" y2="7"/><line x1="2" x2="22" y1="12" y2="12"/><line x1="2" x2="22" y1="17" y2="17"/>
      </svg>
      <span class="text-lg font-semibold tracking-wide">Film<span class="text-orange-400">Pro</span></span>
    </div>
    <div id="api-status" class="text-xs text-neutral-500 flex items-center gap-1.5 px-3 py-1.5 rounded-full border border-white/8">
      <span id="api-dot" class="w-1.5 h-1.5 rounded-full bg-neutral-600"></span>
      <span id="api-label">verificando...</span>
    </div>
  </nav>

  <!-- Hero -->
  <section class="relative z-10 text-center px-6 pt-20 pb-14 max-w-3xl mx-auto animate-in">
    <h1 class="text-5xl lg:text-6xl font-bold tracking-tight mb-4 leading-tight">
      Seu próximo<br>
      <span class="text-transparent bg-clip-text bg-gradient-to-r from-orange-300 to-orange-500">filme favorito</span>
    </h1>
    <p class="text-neutral-400 text-lg mb-10">
      Descreva o que você quer assistir — nossa IA busca no catálogo TMDB e recomenda os melhores.
    </p>

    <!-- Form -->
    <form id="form" onsubmit="buscar(event)" class="flex flex-col sm:flex-row gap-3 max-w-2xl mx-auto">
      <div class="flex-1 flex items-center bg-[#0a0a0a] border border-white/10 rounded-xl focus-within:border-orange-500/40 transition-colors">
        <textarea
          id="input"
          rows="1"
          placeholder="Ex: suspense psicológico dos anos 90 com boa trilha sonora..."
          minlength="10" maxlength="500"
          oninput="onInput(this)"
          class="flex-1 bg-transparent text-sm text-white px-4 py-4 focus:outline-none placeholder:text-neutral-600 resize-none leading-normal"
          style="min-height:52px; overflow-y:hidden;"
        ></textarea>
      </div>
      <button type="submit" id="btn"
        class="flex items-center justify-center gap-2 bg-gradient-to-t from-amber-200 via-orange-400 to-orange-500 text-[#2c1306] font-semibold px-6 py-3 rounded-xl shadow-[0_0_40px_-5px_rgba(249,115,22,0.5)] hover:scale-105 transition-transform sm:w-auto w-full flex-shrink-0">
        <svg id="btn-icon" fill="none" height="15" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" width="15">
          <path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/>
        </svg>
        <span id="btn-label">Recomendar</span>
      </button>
    </form>

    <div class="flex justify-end max-w-2xl mx-auto mt-1.5">
      <span id="char" class="text-xs text-neutral-600">0 / 500</span>
    </div>
    <div id="error" class="hidden mt-4 text-sm text-red-400 bg-red-900/15 border border-red-500/15 px-4 py-3 rounded-lg max-w-2xl mx-auto text-left"></div>

    <!-- Pills de exemplo -->
    <div class="flex flex-wrap justify-center gap-2 mt-6">
      <span class="text-xs text-neutral-500 self-center">Experimente:</span>
      <button onclick="preencher(this)" class="text-xs px-3 py-1.5 rounded-full border border-white/10 bg-white/5 text-neutral-400 hover:text-white hover:border-white/20 transition-colors">Suspense psicológico</button>
      <button onclick="preencher(this)" class="text-xs px-3 py-1.5 rounded-full border border-white/10 bg-white/5 text-neutral-400 hover:text-white hover:border-white/20 transition-colors">Ficção científica filosófica</button>
      <button onclick="preencher(this)" class="text-xs px-3 py-1.5 rounded-full border border-white/10 bg-white/5 text-neutral-400 hover:text-white hover:border-white/20 transition-colors">Comédia romântica anos 90</button>
      <button onclick="preencher(this)" class="text-xs px-3 py-1.5 rounded-full border border-white/10 bg-white/5 text-neutral-400 hover:text-white hover:border-white/20 transition-colors">Anime de ação</button>
    </div>
  </section>

  <!-- Resultados -->
  <section id="results" class="relative z-10 max-w-6xl mx-auto px-6 pb-24 hidden">
    <div class="flex items-center justify-between mb-8">
      <div>
        <h2 class="text-2xl font-semibold">Recomendações para você</h2>
        <p id="subtitle" class="text-sm text-neutral-500 mt-1"></p>
      </div>
      <button onclick="resetar()" class="text-xs text-neutral-400 hover:text-white border border-white/10 hover:border-white/20 px-3 py-1.5 rounded-lg transition-colors flex items-center gap-1.5">
        <svg fill="none" height="11" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" width="11"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
        Nova busca
      </button>
    </div>

    <!-- Skeleton -->
    <div id="skeleton" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5 hidden">
      <div class="rounded-2xl bg-[#0a0a0a] border border-white/5 overflow-hidden h-[380px]">
        <div class="skeleton h-52 w-full"></div>
        <div class="p-4 space-y-2">
          <div class="skeleton h-4 w-3/4"></div>
          <div class="skeleton h-3 w-1/2"></div>
          <div class="skeleton h-3 w-full"></div>
          <div class="skeleton h-3 w-2/3"></div>
        </div>
      </div>
      <div class="rounded-2xl bg-[#0a0a0a] border border-white/5 overflow-hidden h-[380px] hidden sm:block">
        <div class="skeleton h-52 w-full"></div>
        <div class="p-4 space-y-2">
          <div class="skeleton h-4 w-3/4"></div><div class="skeleton h-3 w-1/2"></div>
          <div class="skeleton h-3 w-full"></div><div class="skeleton h-3 w-2/3"></div>
        </div>
      </div>
      <div class="rounded-2xl bg-[#0a0a0a] border border-white/5 overflow-hidden h-[380px] hidden lg:block">
        <div class="skeleton h-52 w-full"></div>
        <div class="p-4 space-y-2">
          <div class="skeleton h-4 w-3/4"></div><div class="skeleton h-3 w-1/2"></div>
          <div class="skeleton h-3 w-full"></div><div class="skeleton h-3 w-2/3"></div>
        </div>
      </div>
      <div class="rounded-2xl bg-[#0a0a0a] border border-white/5 overflow-hidden h-[380px] hidden xl:block">
        <div class="skeleton h-52 w-full"></div>
        <div class="p-4 space-y-2">
          <div class="skeleton h-4 w-3/4"></div><div class="skeleton h-3 w-1/2"></div>
          <div class="skeleton h-3 w-full"></div><div class="skeleton h-3 w-2/3"></div>
        </div>
      </div>
    </div>

    <!-- Grid de filmes -->
    <div id="grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5"></div>
  </section>

  <footer class="relative z-10 border-t border-white/5 py-6 text-center text-xs text-neutral-600">
    FilmPro — IA sobre dados TMDB &bull; tb_discover_unified_tmdb
  </footer>

  <script>
    // Altere para a Lambda Function URL após o terraform apply
    const API_URL = 'LAMBDA_FUNCTION_URL_AQUI';

    // Verificar saúde da API
    async function checkApi() {
      const dot = document.getElementById('api-dot');
      const label = document.getElementById('api-label');
      try {
        const r = await fetch(API_URL, { method: 'OPTIONS', signal: AbortSignal.timeout(4000) });
        if (r.ok || r.status === 200) {
          dot.className = 'w-1.5 h-1.5 rounded-full bg-orange-400';
          label.textContent = 'API ativa';
        } else throw new Error();
      } catch {
        dot.className = 'w-1.5 h-1.5 rounded-full bg-red-700';
        label.textContent = 'API offline';
      }
    }
    document.addEventListener('DOMContentLoaded', () => { checkApi(); setInterval(checkApi, 30_000); });

    function onInput(el) {
      el.style.height = 'auto';
      el.style.height = el.scrollHeight + 'px';
      document.getElementById('char').textContent = `${el.value.length} / 500`;
    }

    function preencher(btn) {
      const el = document.getElementById('input');
      el.value = btn.textContent.trim();
      onInput(el);
      el.focus();
    }

    function setCarregando(sim) {
      const btn = document.getElementById('btn');
      const icon = document.getElementById('btn-icon');
      const label = document.getElementById('btn-label');
      if (sim) {
        btn.disabled = true;
        btn.classList.add('opacity-75', 'cursor-not-allowed');
        btn.classList.remove('hover:scale-105');
        icon.outerHTML = `<svg id="btn-icon" class="spinner" fill="none" height="15" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" width="15"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>`;
        label.textContent = 'Buscando...';
      } else {
        btn.disabled = false;
        btn.classList.remove('opacity-75', 'cursor-not-allowed');
        btn.classList.add('hover:scale-105');
        document.getElementById('btn-icon').outerHTML = `<svg id="btn-icon" fill="none" height="15" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" width="15"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>`;
        label.textContent = 'Recomendar';
      }
    }

    function mostrarErro(msg) {
      const el = document.getElementById('error');
      el.textContent = msg;
      el.classList.remove('hidden');
    }

    function esconderErro() {
      document.getElementById('error').classList.add('hidden');
    }

    function resetar() {
      document.getElementById('results').classList.add('hidden');
      document.getElementById('grid').innerHTML = '';
      document.getElementById('input').value = '';
      document.getElementById('char').textContent = '0 / 500';
      esconderErro();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function renderCard(m, i) {
      const delay = Math.min(i * 60, 400);
      const generos = m.genre_names || '';
      const nota = parseFloat(m.vote_average || 0).toFixed(1);
      const ano = m.year || '';
      const tipo = m.media_type === 'tv' ? 'Série' : 'Filme';

      return `
        <article class="card rounded-2xl bg-[#0a0a0a] border border-white/5 overflow-hidden flex flex-col"
                 style="animation: fadeInUp 0.5s ease ${delay}ms both;">
          <!-- Header colorido como poster placeholder -->
          <div class="h-40 bg-gradient-to-br from-orange-950/60 to-neutral-900 flex items-center justify-center flex-shrink-0">
            <svg fill="none" height="36" stroke="rgba(249,115,22,0.3)" stroke-width="1.2" viewBox="0 0 24 24" width="36">
              <rect width="20" height="20" x="2" y="2" rx="2.18"/>
              <line x1="7" x2="7" y1="2" y2="22"/><line x1="17" x2="17" y1="2" y2="22"/>
              <line x1="2" x2="22" y1="7" y2="7"/><line x1="2" x2="22" y1="12" y2="12"/><line x1="2" x2="22" y1="17" y2="17"/>
            </svg>
          </div>

          <div class="p-4 flex flex-col flex-1">
            <!-- Badges -->
            <div class="flex items-center gap-2 mb-2">
              ${nota > 0 ? `<span class="flex items-center gap-1 text-xs text-orange-400">
                <svg fill="currentColor" height="11" viewBox="0 0 20 20" width="11"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 0 0 .95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 0 0-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 0 0-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 0 0-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 0 0 .951-.69l1.07-3.292Z"/></svg>
                ${nota}
              </span>` : ''}
              ${ano ? `<span class="text-xs text-neutral-500">${ano}</span>` : ''}
              <span class="text-xs px-1.5 py-0.5 rounded bg-orange-500/10 text-orange-400 border border-orange-500/15">${tipo}</span>
            </div>

            <h3 class="text-sm font-semibold text-white mb-1 leading-snug line-clamp-2">${m.title || 'Sem título'}</h3>

            ${generos ? `<p class="text-[10px] text-orange-400/70 mb-2">${generos}</p>` : ''}

            <p class="text-xs text-neutral-400 leading-relaxed line-clamp-3 flex-1">${m.overview || ''}</p>

            ${m.recommendation_reason ? `
            <div class="mt-3 pt-3 border-t border-white/5">
              <p class="text-[10px] text-neutral-500 leading-relaxed">
                <span class="text-orange-400/60">✦</span> ${m.recommendation_reason}
              </p>
            </div>` : ''}
          </div>
        </article>
      `;
    }

    async function buscar(e) {
      e.preventDefault();
      esconderErro();

      const preferences = document.getElementById('input').value.trim();
      if (preferences.length < 10) {
        mostrarErro('Descreva suas preferências com pelo menos 10 caracteres.');
        return;
      }

      setCarregando(true);

      const results = document.getElementById('results');
      const skeleton = document.getElementById('skeleton');
      const grid = document.getElementById('grid');

      results.classList.remove('hidden');
      skeleton.classList.remove('hidden');
      grid.innerHTML = '';
      grid.classList.add('hidden');

      setTimeout(() => results.scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);

      try {
        const r = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ preferences }),
        });

        const data = await r.json();

        if (!r.ok) throw new Error(data.error || `Erro ${r.status}`);

        const movies = data.movies || [];
        if (!movies.length) throw new Error('Nenhum filme encontrado. Tente ser mais genérico.');

        document.getElementById('subtitle').textContent =
          `${movies.length} recomendação${movies.length !== 1 ? 'ões' : ''} para "${preferences.slice(0,60)}${preferences.length > 60 ? '…' : ''}"`;

        grid.innerHTML = movies.map((m, i) => renderCard(m, i)).join('');
        skeleton.classList.add('hidden');
        grid.classList.remove('hidden');

      } catch (err) {
        skeleton.classList.add('hidden');
        results.classList.add('hidden');
        mostrarErro(err.message || 'Erro ao conectar com a API.');
      } finally {
        setCarregando(false);
      }
    }
  </script>
</body>
</html>
