name: "PROD DEPLOY"

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  terraform:
    uses: ./.github/workflows/terraform.yml
    with:
      environment: prod
      aws-assume-role-arn: "arn:aws:iam::022126342808:role/github-actions-lsg-pipeline"
      aws-region: "sa-east-1"
      aws-statefile-s3-bucket: "lsg-sa-east-1-terraform-statefiles"
      aws-lock-dynamodb-table: "lsg-sa-east-1-terraform-lock"