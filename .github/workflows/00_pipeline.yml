name: Pipeline CI/CD

on:
  push:
    branches: [feature/*, develop, main]
  workflow_dispatch:
    inputs:
      environment:
        required: true
        default: dev
        type: choice
        options: [dev, prod]

permissions:
  id-token: write
  contents: read
  actions: write

concurrency:
  group: pipeline-${{ github.ref }}
  cancel-in-progress: true

jobs:

  context:
    runs-on: ubuntu-latest
    outputs:
      env: ${{ steps.set.outputs.env }}
    steps:
      - id: set
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            echo "env=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
          elif [[ "${GITHUB_REF_NAME}" == "develop" ]]; then
            echo "env=dev" >> $GITHUB_OUTPUT
          else
            echo "env=prod" >> $GITHUB_OUTPUT
          fi

  lint:
    uses: ./.github/workflows/01_lint.yml

  tests:
    uses: ./.github/workflows/02_tests.yml

  security:
    uses: ./.github/workflows/03_security.yml
    permissions:
      contents: read
      security-events: write

  build:
    needs: [lint, tests, security]
    uses: ./.github/workflows/04_build.yml

  terraform:
    needs: build
    if: github.ref_name == 'develop' || github.ref_name == 'main' || github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/05_terraform.yml
    with:
      environment: ${{ needs.context.outputs.env }}
    secrets:
      aws-assume-role-arn: ${{ needs.context.outputs.env == 'dev' && secrets.AWS_ASSUME_ROLE_ARN_DEV || secrets.AWS_ASSUME_ROLE_ARN_PROD }}
      aws-statefile-s3-bucket: ${{ needs.context.outputs.env == 'dev' && secrets.AWS_STATEFILE_S3_BUCKET_DEV || secrets.AWS_STATEFILE_S3_BUCKET_PROD }}
      aws-lock-dynamodb-table: ${{ needs.context.outputs.env == 'dev' && secrets.AWS_LOCK_DYNAMODB_TABLE_DEV || secrets.AWS_LOCK_DYNAMODB_TABLE_PROD }}

  auto-pr:
    needs: [lint, tests, security, build, terraform]
    if: |
      (startsWith(github.ref_name, 'feature/') || github.ref_name == 'develop') &&
      always() &&
      needs.terraform.result == 'success'
    uses: ./.github/workflows/06_pr_auto.yml
    with:
      branch_name: ${{ github.ref_name }}
    permissions:
      contents: write
      pull-requests: write