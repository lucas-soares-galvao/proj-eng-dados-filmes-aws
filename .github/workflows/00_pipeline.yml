# Nome da Pipeline que aparece no topo da aba Actions do GitHub
name: Glue ETL Pipeline CI/CD

# Define os gatilhos: a esteira roda sempre que houver um push nessas branches específicas
# ou quando for disparada manualmente para testes/debug.
on:
  push:
    branches: [feature/*, develop, release, main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Ambiente de deploy (dev, hom, prod)'
        required: false
        default: 'dev'

# Permissões padrão para o token do GitHub (necessário para autenticação OIDC/AWS)
permissions:
  id-token: write
  contents: read
  actions: write

jobs:

  # 1. Job de Testes: Chama o workflow reutilizável que criamos (01_test.yml)
  # Roda para todas as branches configuradas no 'on'
  test:
    uses: ./.github/workflows/01_test.yml

  # 2. Job de Build da App: Cria artifacts Glue ETL
  build-app:
    needs: test
    if: |
      (github.ref_name == 'develop' || github.ref_name == 'release' || github.ref_name == 'main' || github.event_name == 'workflow_dispatch') && 
      needs.test.result == 'success' && needs.terraform.outputs.was_destroyed != 'true'
    uses: ./.github/workflows/03_build_app.yml
    secrets:
      aws-assume-role-arn: ${{ secrets.AWS_ASSUME_ROLE_ARN }}
      aws-region: ${{ secrets.AWS_REGION }}
      aws-artifacts-s3-bucket: ${{ secrets.AWS_ARTIFACTS_S3_BUCKET }}

  # 3. Job de Terraform: Realiza o deploy da infraestrutura
  terraform:
    needs: test # Só inicia se o job 'test' terminar com sucesso
    # Condição: roda em branches de ambiente ou manualmente via workflow_dispatch
    if: |
      (github.ref_name == 'develop' || github.ref_name == 'release' || github.ref_name == 'main' || github.event_name == 'workflow_dispatch') && 
      needs.test.result == 'success'
    uses: ./.github/workflows/02_terraform.yml
    with:
      # Lógica para decidir o ambiente AWS baseado no nome da branch atual
      environment: ${{ github.ref_name == 'develop' && 'dev' || github.ref_name == 'release' && 'hom' || 'prod' }}
    secrets:
      # Passagem de segredos necessários para a autenticação na AWS via OIDC
      aws-assume-role-arn: ${{ secrets.AWS_ASSUME_ROLE_ARN }}
      aws-region: ${{ secrets.AWS_REGION }}
      aws-statefile-s3-bucket: ${{ secrets.AWS_STATEFILE_S3_BUCKET }}
      aws-lock-dynamodb-table: ${{ secrets.AWS_LOCK_DYNAMODB_TABLE }}

  # 4. Job de Deploy da App: Atualiza Glue ETL depois do build e da infra
  deploy-app:
    needs: [build-app, terraform]
    if: |
      (github.ref_name == 'develop' || github.ref_name == 'release' || github.ref_name == 'main' || github.event_name == 'workflow_dispatch') && 
      needs.build-app.result == 'success' && needs.terraform.result == 'success' && needs.terraform.outputs.was_destroyed != 'true'
    uses: ./.github/workflows/04_deploy_app.yml
    with:
      environment: ${{ github.ref_name == 'develop' && 'dev' || github.ref_name == 'release' && 'hom' || 'prod' }}
    secrets:
      AWS_ASSUME_ROLE_ARN: ${{ secrets.AWS_ASSUME_ROLE_ARN }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
      AWS_ARTIFACTS_S3_BUCKET: ${{ secrets.AWS_ARTIFACTS_S3_BUCKET }}

  # 5. Auto PR para Feature: Promove o código de feature/* para develop
  auto-pr-feature:
    needs: test # Só depende dos testes passarem
    if: (startsWith(github.ref_name, 'feature/') && needs.test.result == 'success')
    uses: ./.github/workflows/05_pr_auto.yml
    with:
      branch_name: ${{ github.ref_name }}
    permissions: # Permissões extras para criar PR e editar conteúdo
      contents: write
      pull-requests: write

  # 6. Auto PR para Ambientes: Promove develop -> release ou release -> main
  auto-pr-environment:
    needs: [deploy-app, terraform] # Só inicia se o deploy do app deu certo ou se o terraform indicou que a infraestrutura foi destruída (caso de teste de destroy)
    # Só roda para develop ou release (main não tem destino posterior para promover)
    if: |
      always() &&
      (github.ref_name == 'develop' || github.ref_name == 'release' || github.event_name == 'workflow_dispatch') &&
      (needs.deploy-app.result == 'success' || needs.terraform.outputs.was_destroyed == 'true') 
    uses: ./.github/workflows/05_pr_auto.yml
    with:
      branch_name: ${{ github.ref_name }}
    permissions:
      contents: write
      pull-requests: write