name: Auto PR Pipeline (Reusable)

on:
  workflow_call:
    inputs:
      branch_name:
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  promote:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Define base branch
        id: branch
        run: |
          SOURCE_BRANCH="${{ inputs.branch_name }}"

          if [[ "$SOURCE_BRANCH" == feature/* ]]; then
            echo "base=develop" >> $GITHUB_OUTPUT
          elif [[ "$SOURCE_BRANCH" == "develop" ]]; then
            echo "base=main" >> $GITHUB_OUTPUT
          else
            echo "Branch não suportada"
            exit 1
          fi

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # Valida sintaxe Terraform antes de abrir PR (sem conectar ao backend remoto)
      - name: Terraform Validate
        run: |
          cd infra
          terraform init -backend=false
          terraform validate

      - name: Terraform Format Check
        run: cd infra && terraform fmt -check -recursive

      - name: Create or Update PR
        run: |
          BASE=${{ steps.branch.outputs.base }}
          HEAD=${{ inputs.branch_name }}

          PR_NUMBER=$(gh pr list --base "$BASE" --head "$HEAD" --json number --jq '.[0].number // ""')

          if [ -z "$PR_NUMBER" ]; then
            gh pr create \
              --base "$BASE" \
              --head "$HEAD" \
              --title "Auto PR: $HEAD → $BASE" \
              --body "PR criado automaticamente via Pipeline CI/CD."
          else
            gh pr edit "$PR_NUMBER" \
              --title "Auto PR: $HEAD → $BASE" \
              --body "PR atualizado automaticamente via Pipeline CI/CD."
            echo "PR já existente: #$PR_NUMBER"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
