name: 3. Auto PR Pipeline (Reusable)

# =============================================================================
# Cria ou atualiza Pull Requests automaticamente ao fazer push em uma branch.
# Chamado pelo 00_pipeline.yml após testes (feature) ou terraform (develop).
#
# Mapeamento de branches:
#   feature/* → PR para develop
#   develop   → PR para main
#
# Valida sintaxe Terraform antes de abrir o PR para evitar erros óbvios.
# =============================================================================

on:
  workflow_call:
    inputs:
      branch_name:
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  promote:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Define base branch
        id: branch
        run: |
          SOURCE_BRANCH="${{ inputs.branch_name }}"

          if [[ "$SOURCE_BRANCH" == feature/* ]]; then
            echo "base=develop" >> $GITHUB_OUTPUT
            echo "✅ Branch base definida: develop (source: $SOURCE_BRANCH)"
          elif [[ "$SOURCE_BRANCH" == "develop" ]]; then
            echo "base=main" >> $GITHUB_OUTPUT
            echo "✅ Branch base definida: main (source: $SOURCE_BRANCH)"
          else
            echo "❌ Branch não suportada para auto PR: $SOURCE_BRANCH"
            exit 1
          fi

      - name: Setup Terraform
        if: startsWith(inputs.branch_name, 'feature/')
        uses: hashicorp/setup-terraform@v3

      # Valida sintaxe Terraform antes de abrir PR (sem conectar ao backend remoto)
      # Executado apenas em feature/* — develop já passou pelo 02_terraform.yml completo
      - name: Terraform Validate
        if: startsWith(inputs.branch_name, 'feature/')
        run: |
          cd infra
          terraform init -backend=false
          terraform validate
          echo "✅ Terraform validate concluído com sucesso"

      - name: Terraform Format Check
        if: startsWith(inputs.branch_name, 'feature/')
        run: |
          cd infra && terraform fmt -check -recursive
          echo "✅ Terraform format check concluído com sucesso"

      - name: Create or Update PR
        run: |
          BASE=${{ steps.branch.outputs.base }}
          HEAD=${{ inputs.branch_name }}

          PR_NUMBER=$(gh pr list --base "$BASE" --head "$HEAD" --json number --jq '.[0].number // ""')

          if [ -z "$PR_NUMBER" ]; then
            gh pr create \
              --base "$BASE" \
              --head "$HEAD" \
              --title "Auto PR: $HEAD → $BASE" \
              --body "PR criado automaticamente via Pipeline CI/CD."
            echo "✅ PR criado com sucesso: $HEAD → $BASE"
          else
            gh pr edit "$PR_NUMBER" \
              --title "Auto PR: $HEAD → $BASE" \
              --body "PR atualizado automaticamente via Pipeline CI/CD."
            echo "✅ PR #$PR_NUMBER atualizado com sucesso: $HEAD → $BASE"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
