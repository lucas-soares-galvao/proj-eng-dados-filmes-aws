name: "DEV DEPLOY"

on:
  push:
    branches:
      - develop

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  terraform:
    uses: ./.github/workflows/terraform.yml
    with:
      environment: dev
    secrets:
      aws-assume-role-arn: ${{ secrets.AWS_ASSUME_ROLE_ARN }}
      aws-region: ${{ secrets.AWS_REGION }}
      aws-statefile-s3-bucket: ${{ secrets.AWS_STATEFILE_S3_BUCKET }}
      aws-lock-dynamodb-table: ${{ secrets.AWS_LOCK_DYNAMODB_TABLE }}

  create-pr-to-hom:
    needs: terraform
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check if PR from dev to hom exists
        id: check-pr
        run: |
          PR_EXISTS=$(gh pr list --head dev --base hom --json number --jq 'length')
          echo "pr_exists=$PR_EXISTS" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Create PR from dev to hom if not exists
        if: steps.check-pr.outputs.pr_exists == '0'
        run: |
          gh pr create --title "hom <- dev" --body "Auto-generated PR after successful dev deployment" --head dev --base hom
        env:
          GH_TOKEN: ${{ github.token }}