name: Build Generic Artifacts

on:
  workflow_call:
    inputs:
      app_type:
        required: true
        type: string
    secrets:
      aws-assume-role-arn:
        required: true
      aws-region:
        required: true
      aws-artifacts-s3-bucket:
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: [dev, hom, prod]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Prepare artifacts
        run: |
          mkdir -p artifacts

          case "${{ inputs.app_type }}" in
            glue)
              cp app/main.py artifacts/script.py
              ;;
            lambda)
              zip -r artifacts/lambda.zip app/
              ;;
            *)
              cp -r app/* artifacts/
              ;;
          esac

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.aws-assume-role-arn }}
          aws-region: ${{ secrets.aws-region }}

      - name: Upload to S3
        run: |
          BUCKET="${{ secrets.aws-artifacts-s3-bucket }}"
          REPO="${GITHUB_REPOSITORY##*/}"
          PATH="s3://$BUCKET/${{ inputs.app_type }}/$REPO/${{ matrix.environment }}/"

          aws s3 cp artifacts/ "$PATH" --recursive