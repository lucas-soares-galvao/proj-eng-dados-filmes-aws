name: Auto PR Pipeline (Reusable)

on:
  workflow_call:
    inputs:
      github-ref-name:
        description: 'Branch atual'
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  promote:
    runs-on: ubuntu-latest

    steps:
      # 🔹 Checkout
      - name: Checkout
        uses: actions/checkout@v4

      # 🔍 Descobrir destino do PR
      - name: Define base branch
        id: branch
        run: |
          REF="${{ inputs.github-ref-name }}"
          BASE=""

          if [[ "$REF" == feature/* ]]; then
            BASE="develop"
          elif [[ "$REF" == "develop" ]]; then
            BASE="release"
          elif [[ "$REF" == "release" ]]; then
            BASE="main"
          else
            echo "Branch '$REF' não suportada, pulando..."
            exit 0
          fi

          echo "base=$BASE" >> $GITHUB_OUTPUT

      # 🔹 (Opcional) Terraform Validate
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Validate
        run: |
          cd infra
          terraform init -backend=false
          terraform validate

      # 🔀 Criar ou atualizar PR (com proteção)
      - name: Create or Update PR
        run: |
          BASE=${{ steps.branch.outputs.base }}
          HEAD=${{ inputs.github-ref-name }}

          # 🔹 Evita erro: No commits between branches
          DIFF=$(git log "$BASE..$HEAD" --oneline)
          if [ -z "$DIFF" ]; then
            echo "Nenhum commit entre $BASE e $HEAD. Pulando PR."
            exit 0
          fi

          PR_NUMBER=$(gh pr list --base "$BASE" --head "$HEAD" --json number --jq '.[0].number // ""')

          if [ -z "$PR_NUMBER" ]; then
            echo "Criando PR..."
            gh pr create \
              --base "$BASE" \
              --head "$HEAD" \
              --title "Auto PR: $HEAD → $BASE" \
              --body "PR criado automaticamente."
          else
            echo "Atualizando PR existente..."
            gh pr edit "$PR_NUMBER" \
              --title "Auto PR: $HEAD → $BASE" \
              --body "PR atualizado automaticamente."
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}