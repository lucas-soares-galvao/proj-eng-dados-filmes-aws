name: Auto PR Pipeline (Reusable)

on:
  workflow_call:
    inputs:
      branch_name:
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  promote:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Descobrir destino do PR
      - name: Define base branch
        id: branch
        run: |
          if [[ "${GITHUB_REF_NAME}" == feature/* ]]; then
            echo "base=develop" >> $GITHUB_OUTPUT
          elif [[ "${GITHUB_REF_NAME}" == "develop" ]]; then
            echo "base=release" >> $GITHUB_OUTPUT
          elif [[ "${GITHUB_REF_NAME}" == "release" ]]; then
            echo "base=main" >> $GITHUB_OUTPUT
          else
            echo "Branch não suportada"
            exit 1
          fi

      # (Opcional) Terraform validate
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Validate
        run: |
          cd infra
          terraform init -backend=false
          terraform validate

      # Criar ou atualizar PR
      - name: Create or Update PR
        run: |
          BASE=${{ steps.branch.outputs.base }}
          HEAD=${{ github.ref_name }}

          PR_NUMBER=$(gh pr list --base "$BASE" --head "$HEAD" --json number --jq '.[0].number // ""')

          if [ -z "$PR_NUMBER" ]; then
            gh pr create \
              --base "$BASE" \
              --head "$HEAD" \
              --title "Auto PR: $HEAD → $BASE" \
              --body "PR criado automaticamente."
          else
            gh pr edit "$PR_NUMBER" \
              --title "Auto PR: $HEAD → $BASE" \
              --body "PR atualizado automaticamente."
            echo "PR já existente: #$PR_NUMBER"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}