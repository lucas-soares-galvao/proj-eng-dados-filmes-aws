# Raciocinio: encapsula execucao de testes para reutilizacao e padronizacao do pipeline.
#
# Quality Gates neste workflow:
#   BLOQUEANTE (falha a pipeline):  pytest com cobertura ≥ 70%, Ruff linting
#   INFORMATIVO (apenas aviso):    mypy, Bandit, Safety
#
# Por que separar? Gates informativos ainda estão sendo calibrados e não devem
# bloquear entregas. Quando a base de código estiver madura, promova-os a BLOQUEANTE
# simplesmente removendo o 'if ! ... || echo' e deixando o comando retornar o exit code real.

name: Test (Reusable)

# Define que este workflow é "Reutilizável" (pode ser chamado por outros arquivos .yml)
on:
  workflow_call:

jobs:
  test:
    # Especifica o ambiente de execução (neste caso, uma máquina virtual Linux zerada)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # 1. Baixa o código do seu repositório para dentro da máquina virtual
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Prepara o ambiente instalando a versão 3.12 do interpretador Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            app/**/requirements.txt
            test/**/requirements_tests.txt

      # 3. Gerencia as bibliotecas necessárias
      - name: Install dependencies
        run: |
          # Atualiza o instalador de pacotes (pip) para a versão mais recente
          python -m pip install --upgrade pip
          # Instala o framework de teste (pytest) e o plugin de cobertura (pytest-cov)
          pip install pytest pytest-cov
          # Instala ferramentas de quality gates
          pip install ruff mypy bandit safety
          # Instala todos os arquivos de dependências de teste por módulo
          for file in $(find test -type f -name "requirements_tests.txt"); do
            echo "Instalando dependências de teste: $file"
            pip install -r "$file"
          done
          # Instala dependências da aplicação por módulo
          for file in app/*/requirements.txt; do
            if [ -f "$file" ]; then
              echo "Instalando dependências da aplicação: $file"
              pip install -r "$file"
            fi
          done

      # 4. Configura o PYTHONPATH para que o Python consiga importar seus módulos (pasta app, etc)
      # Adicionar o diretório raiz ao GITHUB_ENV resolve erros de "ModuleNotFoundError"
      - name: Configure PYTHONPATH
        run: echo "PYTHONPATH=${GITHUB_WORKSPACE}" >> $GITHUB_ENV

      # 5. [BLOQUEANTE] Linting com Ruff - Verifica estilo de código e boas práticas
      #    Falha a pipeline se o código não seguir as regras configuradas.
      #    Para ignorar uma linha específica, adicione: # noqa: <CODIGO_DA_REGRA>
      - name: Lint with Ruff
        run: |
          ruff check app/ test/
          echo "Ruff linting concluido"

      # 6. [INFORMATIVO] Type Check com mypy - Verifica tipos de dados estaticamente
      #    Gera ::warning:: no log do GitHub, mas NÃO falha a pipeline.
      #    --ignore-missing-imports: ignora pacotes sem stubs de tipo (ex.: awsglue)
      - name: Type Check with mypy
        run: |
          if ! mypy app/ --ignore-missing-imports; then
            echo "::warning::Avisos de tipo detectados (recomendado corrigir antes de deploy)"
          fi
          echo "Mypy type checking concluido"

      # 7. [INFORMATIVO] Security Scan com Bandit - Detecta vulnerabilidades de segurança
      #    -ll  → exibe apenas severidade MÉDIA e ALTA
      #    -f json → salva relatório estruturado para download como artefato
      #    Gera ::warning:: no log do GitHub, mas NÃO falha a pipeline.
      - name: Security Scan with Bandit
        run: |
          # Gera relatório JSON (salvo como artefato abaixo)
          bandit -r app/ -ll -f json -o bandit-report.json || true
          # Exibe resumo legível no log
          if ! bandit -r app/ -ll; then
            echo "::warning::Possiveis vulnerabilidades detectadas pelo Bandit (ver artefato bandit-report.json)"
          fi
          echo "Bandit security scan concluido"

      # 8. [INFORMATIVO] Dependency Check - Verifica vulnerabilidades em dependências
      #    Usa 'safety scan' (sintaxe da versão 3.x; versões antigas usavam 'safety check').
      #    Gera ::warning:: no log do GitHub, mas NÃO falha a pipeline.
      - name: Check Dependencies with Safety
        run: |
          # Gera relatório JSON (salvo como artefato abaixo)
          if ! safety scan --output json > safety-report.json 2>&1; then
            echo "::warning::Vulnerabilidades conhecidas em dependencias (ver artefato safety-report.json)"
          fi
          echo "Safety dependency check concluido"

      # 9. [BLOQUEANTE] Executa os testes e aplica a barreira de qualidade (Quality Gate)
      #    Falha a pipeline se: algum teste falhar OU cobertura < 70%.
      - name: Run tests with Coverage Gate
        run: |
          # pytest: executa os testes
          # --cov=app: mede a cobertura de código apenas da aplicação
          # --cov-report=term-missing: lista no terminal quais linhas não foram testadas
          # --cov-report=xml: gera um arquivo técnico (coverage.xml) para ferramentas externas
          # --cov-fail-under=70: interrompe a pipeline com erro se a cobertura for menor que 70%
          pytest --cov=app \
                 --cov-report=term-missing \
                 --cov-report=xml \
                 --cov-fail-under=70

      # 10. Upload de relatórios de segurança como artefatos do GitHub Actions
      #     Artefatos ficam disponíveis por 7 dias na aba "Summary" do run.
      #     Para baixar: vá em Actions → run → Artifacts → security-reports
      - name: Upload Security Reports
        if: always() # Sobe os relatórios mesmo se algum step anterior falhou
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            bandit-report.json
            safety-report.json
            coverage.xml
          if-no-files-found: ignore
          retention-days: 7

      # 11. Quality Gate Summary - Resumo final de qualidade
      - name: Quality Gate Summary
        if: always()
        run: |
          echo "=========================================="
          echo "        QUALITY GATES SUMMARY"
          echo "=========================================="
          echo "[BLOQUEANTE] Testes Unitarios (pytest)"
          echo "[BLOQUEANTE] Cobertura de Codigo (Gate: >= 70%)"
          echo "[BLOQUEANTE] Linting (ruff)"
          echo "[INFORMATIVO] Type Checking (mypy)"
          echo "[INFORMATIVO] Security Analysis (bandit)"
          echo "[INFORMATIVO] Dependency Vulnerabilities (safety)"
          echo "=========================================="
          echo "Relatorios de seguranca disponiveis em: Actions > Artifacts > security-reports"
          echo "=========================================="
          
