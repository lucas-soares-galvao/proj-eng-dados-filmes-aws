name: Test (Reusable)

on:
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            app/**/requirements.txt
            test/**/requirements_tests.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov
          pip install ruff mypy bandit safety
          for file in $(find test -type f -name "requirements_tests.txt"); do
            echo "Instalando dependências de teste: $file"
            pip install -r "$file"
          done
          for file in app/*/requirements.txt; do
            if [ -f "$file" ]; then
              echo "Instalando dependências da aplicação: $file"
              pip install -r "$file"
            fi
          done

      - name: Configure PYTHONPATH
        run: echo "PYTHONPATH=${GITHUB_WORKSPACE}" >> $GITHUB_ENV

      - name: Lint with Ruff
        run: |
          ruff check app/ test/
          echo "Ruff linting concluido"

      # Não falha o pipeline — apenas avisa sobre problemas de tipo
      - name: Type Check with mypy
        run: |
          if ! mypy app/ --ignore-missing-imports; then
            echo "::warning::Avisos de tipo detectados (recomendado corrigir antes de deploy)"
          fi
          echo "Mypy type checking concluido"

      # Não falha o pipeline — apenas avisa sobre problemas de segurança
      - name: Security Scan with Bandit
        run: |
          if ! bandit -r app/ -ll -f json -o bandit-report.json; then
            echo "::warning::Possiveis vulnerabilidades detectadas pelo Bandit"
          fi
          echo "Bandit security scan concluido"
          bandit -r app/ -ll || echo "Resumo do Bandit com alertas"

      # Não falha o pipeline — apenas avisa sobre CVEs em dependências
      - name: Check Dependencies with Safety
        run: |
          if ! safety check --json --output safety-report.json; then
            echo "::warning::Vulnerabilidades conhecidas em dependencias (recomendado revisar)"
          fi
          echo "Safety dependency check concluido"

      - name: Run tests with Coverage Gate
        run: |
          pytest --cov=app \
                 --cov-report=term-missing \
                 --cov-report=xml \
                 --cov-fail-under=80

      - name: Quality Gate Summary
        if: always()
        run: |
          echo "=========================================="
          echo "        QUALITY GATES SUMMARY"
          echo "=========================================="
          echo "Etapas executadas:"
          echo "- Testes Unitarios (pytest)"
          echo "- Cobertura de Codigo (Coverage Gate: 80%)"
          echo "- Linting (ruff)"
          echo "- Type Checking (mypy - informativo)"
          echo "- Security Analysis (bandit - informativo)"
          echo "- Dependency Vulnerabilities (safety - informativo)"
          echo "=========================================="
          echo "Resumo concluido. Consulte os logs para detalhes de alertas ou falhas."
          echo "=========================================="
