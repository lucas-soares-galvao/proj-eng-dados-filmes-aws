name: 1. Test (Reusable)

on:
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            app/**/requirements.txt
            test/**/requirements_tests.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov
          pip install ruff mypy bandit safety
          for file in $(find test -type f -name "requirements_tests.txt"); do
            echo "Instalando dependências de teste: $file"
            pip install -r "$file"
          done
          for file in app/*/requirements.txt; do
            if [ -f "$file" ]; then
              echo "Instalando dependências da aplicação: $file"
              pip install -r "$file"
            fi
          done
          echo "✅ Todas as dependências instaladas com sucesso"

      - name: Configure PYTHONPATH
        run: echo "PYTHONPATH=${GITHUB_WORKSPACE}" >> $GITHUB_ENV

      - name: Lint with Ruff
        run: |
          ruff check app/ test/
          echo "✅ Ruff linting concluído com sucesso"

      # Não falha o pipeline — apenas avisa sobre problemas de tipo
      - name: Type Check with mypy
        run: |
          if ! mypy app/ --ignore-missing-imports; then
            echo "⚠ Avisos de tipo detectados (recomendado corrigir antes de deploy)"
            echo "::warning::Avisos de tipo detectados (recomendado corrigir antes de deploy)"
          else
            echo "✅ Mypy type checking concluído sem avisos"
          fi

      # Não falha o pipeline — apenas avisa sobre problemas de segurança
      - name: Security Scan with Bandit
        run: |
          if ! bandit -r app/ -ll -f json -o bandit-report.json; then
            echo "⚠ Possíveis vulnerabilidades detectadas pelo Bandit"
            echo "::warning::Possíveis vulnerabilidades detectadas pelo Bandit"
            bandit -r app/ -ll || true
          else
            echo "✅ Bandit security scan concluído sem vulnerabilidades"
          fi

      # Não falha o pipeline — apenas avisa sobre CVEs em dependências
      - name: Check Dependencies with Safety
        run: |
          if ! safety check --json --output safety-report.json; then
            echo "⚠ Vulnerabilidades conhecidas em dependências (recomendado revisar)"
            echo "::warning::Vulnerabilidades conhecidas em dependências (recomendado revisar)"
          else
            echo "✅ Safety check concluído — nenhuma vulnerabilidade conhecida"
          fi

      - name: Run tests with Coverage Gate
        run: |
          pytest --cov=app \
                 --cov-report=term-missing \
                 --cov-report=xml \
                 --cov-fail-under=80
          echo "✅ Testes e coverage gate (≥80%) concluídos com sucesso"

      - name: Quality Gate Summary
        if: always()
        run: |
          echo "=========================================="
          echo "        QUALITY GATES SUMMARY"
          echo "=========================================="
          echo "Etapas executadas:"
          echo "- Testes Unitários (pytest)             — bloqueante"
          echo "- Cobertura de Código (gate: ≥80%)      — bloqueante"
          echo "- Linting (ruff)                        — bloqueante"
          echo "- Type Checking (mypy)                  — informativo"
          echo "- Security Analysis (bandit)            — informativo"
          echo "- Dependency Vulnerabilities (safety)   — informativo"
          echo "=========================================="
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Todos os quality gates obrigatórios passaram!"
          else
            echo "❌ Um ou mais quality gates obrigatórios falharam."
          fi
          echo "=========================================="
