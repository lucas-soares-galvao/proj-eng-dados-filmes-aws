name: "Release → Main PR"

on:
  pull_request:
    types: [closed]
    branches:
      - release

permissions:
  contents: write
  pull-requests: write

jobs:
  promote:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Auto PR or update release → main
        run: |
          export BASE=main
          export HEAD=release
          PR_NUMBER=$(gh pr list --base "$BASE" --head "$HEAD" --json number --jq '.[0].number // ""')
          if [ -z "$PR_NUMBER" ]; then
            gh pr create --base "$BASE" --head "$HEAD" --title "Auto PR: $HEAD → $BASE" --body "Promoção automática."
          else
            gh pr edit "$PR_NUMBER" --title "Auto PR: $HEAD → $BASE" --body "Promoção automática."
            echo "PR já existente: #$PR_NUMBER"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}