name: "Terraform (Reusable)"

# =============================================================================
# Provisionamento de infraestrutura AWS via Terraform.
# Chamado pelo 00_pipeline.yml para os ambientes dev (develop) e prod (main).
#
# Etapas principais:
#   1. Autenticação AWS via OIDC (sem credenciais armazenadas no GitHub)
#   2. Terraform Init → Validate → Lint → Format Check → Security Scan
#   3. Verifica destroy_config.json — se true, destrói a infra do ambiente
#   4. Terraform Plan → estimativa de custo (Infracost) → Apply
#
# Saída (output):
#   was_destroyed — informa ao 00_pipeline.yml se a infra foi destruída,
#   para que o deploy do FilmBot seja pulado neste caso.
# =============================================================================

on:
  workflow_call:
    inputs:
      environment:
        type: string
        required: true

    outputs:
      was_destroyed:
        description: "Indica se a infraestrutura foi destruída"
        value: ${{ jobs.terraform.outputs.destroyed_status }}

    secrets:
      aws-assume-role-arn:
        required: true
      aws-statefile-s3-bucket:
        required: true
      aws-lock-dynamodb-table:
        required: true
      aws-tmdb-secret-arn:
        required: true
      notification-email:
        required: true
      infracost-api-key:
        required: true

jobs:
  terraform:
    runs-on: ubuntu-latest

    outputs:
      destroyed_status: ${{ steps.read-destroy-config.outputs.destroy }}

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.aws-assume-role-arn }}
          role-session-name: GitHub_to_AWS_via_FederatedOIDC
          aws-region: sa-east-1

      # O plan referencia o .zip da Lambda para calcular hashes; precisa existir antes do plan
      - name: Build Lambda Package
        run: |
          python infra/scripts/build_lambda_package.py \
            --src app/lambda_api \
            --requirements app/lambda_api/requirements.txt \
            --dest infra/.lambda_build
          if [ -z "$(ls -A infra/.lambda_build/ 2>/dev/null)" ]; then
            echo "❌ Build da Lambda falhou — diretório infra/.lambda_build está vazio."
            exit 1
          fi
          echo "✅ Lambda package criado com sucesso"

      # O plan referencia o .whl do Glue ETL; precisa existir antes do plan.
      # Build sempre executado aqui (não via null_resource/local-exec do Terraform),
      # pois o state remoto pode considerar o build "já feito" mesmo em um runner
      # novo onde o arquivo local não existe.
      - name: Build Glue ETL Wheel
        run: |
          python infra/scripts/build_glue_wheel.py \
            --src app/glue_etl \
            --dest infra/.glue_etl_build \
            --name glue_etl_src
          if [ -z "$(ls -A infra/.glue_etl_build/ 2>/dev/null)" ]; then
            echo "❌ Build do Glue ETL falhou — diretório infra/.glue_etl_build está vazio."
            exit 1
          fi
          echo "✅ Glue ETL wheel criado com sucesso"

      - name: Build Glue Agg Wheel
        run: |
          python infra/scripts/build_glue_wheel.py \
            --src app/glue_agg \
            --dest infra/.glue_agg_build \
            --name glue_agg_src
          if [ -z "$(ls -A infra/.glue_agg_build/ 2>/dev/null)" ]; then
            echo "❌ Build do Glue Agg falhou — diretório infra/.glue_agg_build está vazio."
            exit 1
          fi
          echo "✅ Glue Agg wheel criado com sucesso"

      - name: Build Glue Details Wheel
        run: |
          python infra/scripts/build_glue_wheel.py \
            --src app/glue_details \
            --dest infra/.glue_details_build \
            --name glue_details_src
          if [ -z "$(ls -A infra/.glue_details_build/ 2>/dev/null)" ]; then
            echo "❌ Build do Glue Details falhou — diretório infra/.glue_details_build está vazio."
            exit 1
          fi
          echo "✅ Glue Details wheel criado com sucesso"

      # destroy_config.json controla se a infra deve ser destruída (teardown).
      # Formato: { "dev": false, "prod": false }
      # Mude para true no ambiente desejado para acionar o terraform destroy.
      - name: Read destroy configuration
        id: read-destroy-config
        run: |
          DESTROY="$(jq -r '.${{ inputs.environment }}' ./infra/destroy_config.json)"
          if [[ "$DESTROY" != "true" && "$DESTROY" != "false" ]]; then
            echo "❌ Valor inválido em destroy_config.json para '${{ inputs.environment }}': '$DESTROY' (esperado: true ou false)"
            exit 1
          fi
          echo "destroy=$(echo $DESTROY)" >> $GITHUB_OUTPUT
          echo "✅ Configuração de destroy lida: ${{ inputs.environment }}=$DESTROY"

      - name: Terraform Init
        run: |
          cd infra && terraform init \
            -backend-config="bucket=${{ secrets.aws-statefile-s3-bucket }}" \
            -backend-config="key=proj-eng-dados-filmes-aws" \
            -backend-config="region=sa-east-1" \
            -backend-config="dynamodb_table=${{ secrets.aws-lock-dynamodb-table }}"
          echo "✅ Terraform init concluído com sucesso"

      - name: Terraform Validate
        run: |
          cd infra && terraform validate
          echo "✅ Terraform validate concluído com sucesso"

      # Não falha o pipeline — apenas avisa sobre boas práticas
      - name: Setup and Run TFLint
        run: |
          curl -s https://raw.githubusercontent.com/terraform-linters/tflint/master/install_linux.sh | bash
          cd infra
          tflint --init
          tflint --format compact || echo "⚠ Avisos de TFLint detectados (verificar antes de deploy)"

      - name: Terraform Format Check
        run: |
          cd infra && terraform fmt -check -recursive
          echo "✅ Terraform format check concluído com sucesso"

      # Não falha o pipeline — avisa sobre segurança e compliance
      - name: Checkov Security Scan
        run: |
          pip install checkov
          cd infra
          checkov -d . \
                  --framework terraform \
                  --quiet \
                  --output json \
                  --output-file checkov-report.json || echo "⚠ Problemas de segurança/compliance detectados"
          checkov -d . --framework terraform --quiet || {
            echo "⚠ Verifique os problemas de segurança identificados acima"
            exit 0
          }

      # Substitui placeholder no tfvars pelo email real (evita commitar emails no repo)
      - name: Inject notification email into tfvars
        run: |
          sed -i 's/REPLACE_VIA_GITHUB_SECRET_NOTIFICATION_EMAIL/${{ secrets.notification-email }}/g' \
            infra/envs/${{ inputs.environment }}/terraform.tfvars

      # Bootstrap: cria e anexa as 6 IAM policies do CI/CD ANTES do plan/apply
      # principal, resolvendo o problema de bootstrap (a role precisa das policies
      # para gerenciar os recursos, mas as policies são criadas pelo mesmo Terraform).
      # Idempotente — se as policies já existem, é um no-op.
      - name: Bootstrap CICD IAM Policies
        if: steps.read-destroy-config.outputs.destroy != 'true'
        run: |
          cd infra
          terraform apply -var-file="./envs/${{ inputs.environment }}/terraform.tfvars" \
            -var="tmdb_secret_arn=${{ secrets.aws-tmdb-secret-arn }}" \
            -var="cicd_statefile_s3_bucket=${{ secrets.aws-statefile-s3-bucket }}" \
            -var="cicd_lock_dynamodb_table=${{ secrets.aws-lock-dynamodb-table }}" \
            -target=aws_iam_policy.cicd_backend \
            -target=aws_iam_role_policy_attachment.cicd_backend \
            -target=aws_iam_policy.cicd_s3 \
            -target=aws_iam_role_policy_attachment.cicd_s3 \
            -target=aws_iam_policy.cicd_iam \
            -target=aws_iam_role_policy_attachment.cicd_iam \
            -target=aws_iam_policy.cicd_compute \
            -target=aws_iam_role_policy_attachment.cicd_compute \
            -target=aws_iam_policy.cicd_observability \
            -target=aws_iam_role_policy_attachment.cicd_observability \
            -target=aws_iam_policy.cicd_lightsail \
            -target=aws_iam_role_policy_attachment.cicd_lightsail \
            -auto-approve
          echo "Aguardando propagação do IAM (eventual consistency ~120s)..."
          sleep 120

          ROLE_NAME="lsg-github-actions-${{ inputs.environment }}"
          EXPECTED_POLICIES=(
            "cicd-terraform-backend-${{ inputs.environment }}"
            "cicd-terraform-s3-${{ inputs.environment }}"
            "cicd-terraform-iam-${{ inputs.environment }}"
            "cicd-terraform-compute-${{ inputs.environment }}"
            "cicd-terraform-observability-${{ inputs.environment }}"
            "cicd-terraform-lightsail-${{ inputs.environment }}"
          )

          ATTACHED=$(aws iam list-attached-role-policies \
            --role-name "$ROLE_NAME" \
            --query "AttachedPolicies[].PolicyName" \
            --output text)

          MISSING=()
          for POLICY in "${EXPECTED_POLICIES[@]}"; do
            if ! echo "$ATTACHED" | grep -qw "$POLICY"; then
              MISSING+=("$POLICY")
            fi
          done

          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "❌ Bootstrap falhou — policies não propagadas após 120s:"
            printf '   - %s\n' "${MISSING[@]}"
            exit 1
          fi

          echo "✅ Bootstrap das IAM policies concluído com sucesso! (${#EXPECTED_POLICIES[@]}/${#EXPECTED_POLICIES[@]} policies verificadas)"

      - name: Terraform Destroy
        if: steps.read-destroy-config.outputs.destroy == 'true'
        id: terraform-destroy
        run: |
          cd infra
          terraform destroy -var-file="./envs/${{ inputs.environment }}/terraform.tfvars" \
            -var="tmdb_secret_arn=${{ secrets.aws-tmdb-secret-arn }}" \
            -var="cicd_statefile_s3_bucket=${{ secrets.aws-statefile-s3-bucket }}" \
            -var="cicd_lock_dynamodb_table=${{ secrets.aws-lock-dynamodb-table }}" \
            -auto-approve
          echo "✅ Terraform destroy concluído com sucesso (${{ inputs.environment }})"

      - name: Terraform Plan
        if: steps.read-destroy-config.outputs.destroy != 'true'
        id: terraform-plan
        run: |
          cd infra
          terraform plan -var-file="./envs/${{ inputs.environment }}/terraform.tfvars" \
            -var="tmdb_secret_arn=${{ secrets.aws-tmdb-secret-arn }}" \
            -var="cicd_statefile_s3_bucket=${{ secrets.aws-statefile-s3-bucket }}" \
            -var="cicd_lock_dynamodb_table=${{ secrets.aws-lock-dynamodb-table }}" \
            -out="${{ inputs.environment }}.plan"
          echo "✅ Terraform plan concluído com sucesso (${{ inputs.environment }})"

      - name: Setup Infracost
        if: steps.read-destroy-config.outputs.destroy != 'true'
        uses: infracost/actions/setup@v3
        with:
          api-key: ${{ secrets.infracost-api-key }}

      - name: Generate Terraform Plan JSON
        if: steps.read-destroy-config.outputs.destroy != 'true'
        run: cd infra && terraform show -json ${{ inputs.environment }}.plan > /tmp/plan.json

      - name: Infracost Breakdown
        if: steps.read-destroy-config.outputs.destroy != 'true'
        run: |
          infracost breakdown \
            --path /tmp/plan.json \
            --format json \
            --out-file /tmp/infracost.json

          echo "## Estimativa de Custo (Infracost) — ${{ inputs.environment }}" >> $GITHUB_STEP_SUMMARY
          infracost output --path /tmp/infracost.json --format table >> $GITHUB_STEP_SUMMARY

      - name: Infracost PR Comment
        if: steps.read-destroy-config.outputs.destroy != 'true' && github.event_name == 'pull_request'
        run: |
          infracost comment github \
            --path /tmp/infracost.json \
            --repo ${{ github.repository }} \
            --github-token ${{ github.token }} \
            --pull-request ${{ github.event.pull_request.number }} \
            --behavior update

      - name: Terraform Apply
        if: steps.read-destroy-config.outputs.destroy != 'true'
        id: terraform-apply
        run: |
          cd infra
          terraform apply "${{ inputs.environment }}.plan"
          echo "✅ Terraform apply concluído com sucesso (${{ inputs.environment }})"
