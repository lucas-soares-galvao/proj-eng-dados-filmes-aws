# Raciocinio: centraliza plan/apply/destroy do Terraform com parametros por ambiente.

name: "Terraform (Reusable)"

# Define que este workflow é chamado por outro (workflow_call)
on:
  workflow_call:
    # Inputs: Parâmetros recebidos do pipeline principal (ex: 'dev', 'prod')
    inputs:
      environment:
        type: string
        required: true
    # Outputs: Variáveis que serão passadas para o pipeline principal (ex: se a infraestrutura foi destruída ou não)
    outputs:
      was_destroyed:
        description: "Indica se a infraestrutura foi destruída"
        value: ${{ jobs.terraform.outputs.destroyed_status }}
    # Secrets: Dados sensíveis necessários para conectar na AWS e no S3 do State
    secrets:
      aws-assume-role-arn:
        required: true
      aws-statefile-s3-bucket:
        required: true
      aws-lock-dynamodb-table:
        required: true
      aws-tmdb-secret-arn:
        required: true

jobs:
  terraform:
    runs-on: ubuntu-latest

    # Outputs do job: Passa para o pipeline principal se a infraestrutura foi destruída ou não (usado para condicional de deploy da app)
    outputs:
      destroyed_status: ${{ steps.read-destroy-config.outputs.destroy }}

    # Define que todos os comandos 'run' usarão o shell bash por padrão
    defaults:
      run:
        shell: bash

    steps:
      # 1. Baixa o código do repositório
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Instala a versão específica do CLI do Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.3

      # 3. Autenticação na AWS usando OIDC (OpenID Connect)
      # Isso evita o uso de chaves fixas (Access Keys), usando uma Role temporária mais segura
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.aws-assume-role-arn }}
          role-session-name: GitHub_to_AWS_via_FederatedOIDC
          aws-region: sa-east-1

      # 4. Build do pacote Lambda antes do plan
      # O data "archive_file" é avaliado durante o plan e exige que .lambda_build exista.
      # O null_resource só executa o local-exec no apply, então o build precisa rodar explicitamente aqui.
      - name: Build Lambda Package
        run: |
          python infra/scripts/build_lambda_package.py \
            --src app/lambda_api \
            --requirements app/lambda_api/requirements.txt \
            --dest infra/.lambda_build

      # 5. Verifica se o ambiente deve ser destruído ou criado
      # Ele lê um arquivo JSON local para saber se a flag de 'destroy' está ativa para aquele ambiente
      - name: Read destroy configuration
        id: read-destroy-config
        run: |
          DESTROY="$(jq -r '.${{ inputs.environment }}' ./infra/destroy_config.json)"
          echo "destroy=$(echo $DESTROY)" >> $GITHUB_OUTPUT

      # 5. Inicializa o Terraform configurando o Backend Remoto dinamicamente
      # O bucket, a chave (nome do repo), a região e a tabela de lock (DynamoDB) vêm dos secrets
      - name: Terraform Init
        run: |
          cd infra && terraform init \
            -backend-config="bucket=${{ secrets.aws-statefile-s3-bucket }}" \
            -backend-config="key=${{ github.event.repository.name }}" \
            -backend-config="region=sa-east-1" \
            -backend-config="dynamodb_table=${{ secrets.aws-lock-dynamodb-table }}"

      # 6. Valida se a sintaxe do código Terraform está correta
      - name: Terraform Validate
        run: cd infra && terraform validate

      # 7. TFLint - Linting para Terraform (detecção de má prática e erros potenciais)
      - name: Setup and Run TFLint
        run: |
          # Instala TFLint
          curl -s https://raw.githubusercontent.com/terraform-linters/tflint/master/install_linux.sh | bash
          
          # Inicializa TFLint com configurações padrão
          cd infra
          tflint --init
          
          # Executa TFLint com formato legível
          echo "🔍 Executando TFLint para validações de boas práticas..."
          tflint --format compact || echo "⚠ Avisos de TFLint detectados (verificar antes de deploy)"

      # 8. Format Check - Verifica se o código está formatado corretamente
      - name: Terraform Format Check
        run: |
          cd infra
          echo "🎨 Verificando formatação do código Terraform..."
          terraform fmt -check -recursive || {
            echo "⚠ Código não formatado. Execute: terraform fmt -recursive"
            exit 0  # Não falha a pipeline, apenas aviso
          }

      # 9. Checkov - Policy validation (detecção de vulnerabilidades de segurança/compliance)
      - name: Checkov Security Scan
        run: |
          # Instala Checkov
          pip install checkov
          
          cd infra
          echo "🔒 Executando Checkov para validações de segurança e compliance..."
          
          # Executa Checkov com output em JSON para relatório
          checkov -d . \
                  --framework terraform \
                  --quiet \
                  --output json \
                  --output-file checkov-report.json || echo "⚠ Problemas de segurança/compliance detectados"
          
          # Exibe um resumo em terminal
          checkov -d . --framework terraform --quiet || {
            echo "⚠ Verifique os problemas de segurança identificados acima"
            exit 0  # Não falha a pipeline para permitir correções iterativas
          }

      # 10. Operação de DESTROY (Executada apenas se a flag no JSON for 'true')
      # Isolamento entre dev/prod é feito por buckets S3 separados (sem necessidade de workspace)
      - name: Terraform Destroy
        if: steps.read-destroy-config.outputs.destroy == 'true'
        id: terraform-destroy
        run: |
          cd infra
          terraform destroy -var-file="./envs/${{ inputs.environment }}/terraform.tfvars" \
            -var="tmdb_secret_arn=${{ secrets.aws-tmdb-secret-arn }}" \
            -auto-approve

      # 11. Planejamento (Plan): Gera o plano de execução se NÃO for para destruir
      # Salva o resultado em um arquivo binário (.plan) para garantir que o Apply execute exatamente o que foi planejado
      - name: Terraform Plan
        if: steps.read-destroy-config.outputs.destroy != 'true'
        id: terraform-plan
        run: |
          cd infra
          terraform plan -var-file="./envs/${{ inputs.environment }}/terraform.tfvars" \
            -var="tmdb_secret_arn=${{ secrets.aws-tmdb-secret-arn }}" \
            -out="${{ inputs.environment }}.plan"

      # 12. Execução (Apply): Aplica as mudanças planejadas no passo anterior
      - name: Terraform Apply
        if: steps.read-destroy-config.outputs.destroy != 'true'
        id: terraform-apply
        run: |
          cd infra
          terraform apply "${{ inputs.environment }}.plan"
          
