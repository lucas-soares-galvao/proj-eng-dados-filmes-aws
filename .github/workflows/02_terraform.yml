# Raciocinio: centraliza plan/apply/destroy do Terraform com parametros por ambiente.
#
# Fluxo de execução (decidido pelo arquivo infra/destroy_config.json):
#
#   destroy_config[ambiente] == "true"  →  passo 10: Terraform DESTROY
#   destroy_config[ambiente] == "false" →  passo 11: Terraform PLAN
#                                          passo 12: Terraform APPLY
#
# Por que usar um arquivo JSON para controlar destroy?
#   Isso permite ativar/desativar o destroy por ambiente sem alterar o código
#   da pipeline. Basta editar destroy_config.json e fazer commit.

name: "Terraform (Reusable)"

# Define que este workflow é chamado por outro (workflow_call)
on:
  workflow_call:
    # Inputs: Parâmetros recebidos do pipeline principal (ex: 'dev', 'prod')
    inputs:
      environment:
        type: string
        required: true
    # Outputs: Variáveis que serão passadas para o pipeline principal (ex: se a infraestrutura foi destruída ou não)
    outputs:
      was_destroyed:
        description: "Indica se a infraestrutura foi destruída"
        value: ${{ jobs.terraform.outputs.destroyed_status }}
    # Secrets: Dados sensíveis necessários para conectar na AWS e no S3 do State
    secrets:
      aws-assume-role-arn:
        required: true
      aws-statefile-s3-bucket:
        required: true
      aws-lock-dynamodb-table:
        required: true
      tmdb-secret-arn:
        required: true

jobs:
  terraform:
    runs-on: ubuntu-latest

    # Outputs do job: Passa para o pipeline principal se a infraestrutura foi destruída ou não (usado para condicional de deploy da app)
    outputs:
      destroyed_status: ${{ steps.read-destroy-config.outputs.destroy }}

    # Define que todos os comandos 'run' usarão o shell bash por padrão
    defaults:
      run:
        shell: bash

    steps:
      # 1. Baixa o código do repositório
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Instala a versão específica do CLI do Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.3

      # 3. Autenticação na AWS usando OIDC (OpenID Connect)
      # Isso evita o uso de chaves fixas (Access Keys), usando uma Role temporária mais segura
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.aws-assume-role-arn }}
          role-session-name: GitHub_to_AWS_via_FederatedOIDC
          aws-region: sa-east-1

      # 4. Verifica se o ambiente deve ser destruído ou criado
      # Ele lê um arquivo JSON local para saber se a flag de 'destroy' está ativa para aquele ambiente
      - name: Read destroy configuration
        id: read-destroy-config
        run: |
          DESTROY="$(jq -r '.${{ inputs.environment }}' ./infra/destroy_config.json)"
          echo "destroy=$(echo $DESTROY)" >> $GITHUB_OUTPUT

      # 5. Gera o terraform.tfvars em runtime para não expor ARNs sensíveis no repositório público
      - name: Generate terraform.tfvars
        run: |
          cat > infra/envs/${{ inputs.environment }}/terraform.tfvars <<EOF
          env             = "${{ inputs.environment }}"
          tmdb_secret_arn = "${{ secrets.tmdb-secret-arn }}"
          EOF

      # 6. Inicializa o Terraform configurando o Backend Remoto dinamicamente
      # O bucket, a chave (nome do repo), a região e a tabela de lock (DynamoDB) vêm dos secrets
      - name: Terraform Init
        run: |
          cd infra && terraform init \
            -backend-config="bucket=${{ secrets.aws-statefile-s3-bucket }}" \
            -backend-config="key=${{ github.event.repository.name }}" \
            -backend-config="region=sa-east-1" \
            -backend-config="dynamodb_table=${{ secrets.aws-lock-dynamodb-table }}"

      # 7. Valida se a sintaxe do código Terraform está correta
      - name: Terraform Validate
        run: cd infra && terraform validate

      # 8. TFLint - Linting para Terraform (detecção de má prática e erros potenciais)
      - name: Setup and Run TFLint
        run: |
          # Instala TFLint
          curl -s https://raw.githubusercontent.com/terraform-linters/tflint/master/install_linux.sh | bash
          
          # Inicializa TFLint com configurações padrão
          cd infra
          tflint --init
          
          # Executa TFLint com formato legível
          echo "🔍 Executando TFLint para validações de boas práticas..."
          tflint --format compact || echo "⚠ Avisos de TFLint detectados (verificar antes de deploy)"

      # 9. [BLOQUEANTE] Format Check - Verifica se o código está formatado corretamente
      #    Falha a pipeline se houver arquivos fora do padrão.
      #    Para corrigir localmente: execute 'terraform fmt -recursive' na pasta infra/
      - name: Terraform Format Check
        run: |
          cd infra
          echo "Verificando formatacao do codigo Terraform..."
          terraform fmt -check -recursive

      # 10. [INFORMATIVO] Checkov - Policy validation (detecção de vulnerabilidades de segurança/compliance)
      #     Gera ::warning:: no log do GitHub, mas NÃO falha a pipeline.
      #     Para tornar BLOQUEANTE: remova o '|| true' no final do segundo checkov.
      - name: Checkov Security Scan
        run: |
          pip install checkov
          cd infra
          echo "Executando Checkov para validacoes de seguranca e compliance..."
          # Gera relatório JSON (salvo como artefato abaixo)
          checkov -d . --framework terraform --quiet --output json --output-file checkov-report.json || true
          # Exibe resumo no terminal; nao falha a pipeline (exit 0 implícito via || true)
          if ! checkov -d . --framework terraform --quiet; then
            echo "::warning::Problemas de seguranca/compliance detectados (ver artefato checkov-report.json)"
          fi

      # 11. Upload do relatório Checkov como artefato do GitHub Actions
      #     Artefatos ficam disponíveis por 7 dias na aba "Summary" do run.
      - name: Upload Checkov Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checkov-report
          path: infra/checkov-report.json
          if-no-files-found: ignore
          retention-days: 7

      # 12. Operação de DESTROY (Executada apenas se a flag no JSON for 'true')
      # Isolamento entre dev/prod é feito por buckets S3 separados (sem necessidade de workspace)
      - name: Terraform Destroy
        if: steps.read-destroy-config.outputs.destroy == 'true'
        id: terraform-destroy
        run: |
          cd infra
          terraform destroy -var-file="./envs/${{ inputs.environment }}/terraform.tfvars" -auto-approve

      # 13. Planejamento (Plan): Gera o plano de execução se NÃO for para destruir
      # Salva o resultado em um arquivo binário (.plan) para garantir que o Apply execute exatamente o que foi planejado
      - name: Terraform Plan
        if: steps.read-destroy-config.outputs.destroy != 'true'
        id: terraform-plan
        run: |
          cd infra
          terraform plan -var-file="./envs/${{ inputs.environment }}/terraform.tfvars" -out="${{ inputs.environment }}.plan"

      # 14. Execução (Apply): Aplica as mudanças planejadas no passo anterior
      - name: Terraform Apply
        if: steps.read-destroy-config.outputs.destroy != 'true'
        id: terraform-apply
        run: |
          cd infra
          terraform apply "${{ inputs.environment }}.plan"
          
