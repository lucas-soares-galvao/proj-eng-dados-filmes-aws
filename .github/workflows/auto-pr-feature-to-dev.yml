name: Auto PR from feature to dev

on:
  push:
    branches:
      - 'feature/**'

permissions:
  pull-requests: write

jobs:
  create-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if PR already exists
        id: check-pr
        run: |
          PR_EXISTS=$(gh pr list --head ${{ github.ref_name }} --base dev --json number --jq 'length')
          echo "pr_exists=$PR_EXISTS" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Create PR if not exists
        if: steps.check-pr.outputs.pr_exists == '0'
        run: |
          gh pr create --title "dev <- ${{ github.ref_name }}" --body "Auto-generated PR from feature branch" --head ${{ github.ref_name }} --base dev
        env:
          GH_TOKEN: ${{ github.token }}