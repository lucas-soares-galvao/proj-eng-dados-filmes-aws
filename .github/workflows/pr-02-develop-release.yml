name: "Develop → Release PR"

on:
  pull_request:
    types: [closed]
    branches:
      - develop

permissions:
  contents: write
  pull-requests: write

jobs:
  promote:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create PR develop → release (safe)
        run: |
          echo "Verificando se já existe PR aberto develop → release..."

          EXISTING_PR=$(gh pr list \
            --base release \
            --head develop \
            --state open \
            --json number \
            --jq '.[0].number')

          if [ -z "$EXISTING_PR" ]; then
            echo "Criando PR..."

            gh pr create \
              --base release \
              --head develop \
              --title "Auto PR: develop → release [${{ github.sha }}]" \
              --body "Promoção automática\n\nOrigem PR: #${{ github.event.pull_request.number }}\nAutor: ${{ github.actor }}"
          else
            echo "PR já existe: #$EXISTING_PR"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}