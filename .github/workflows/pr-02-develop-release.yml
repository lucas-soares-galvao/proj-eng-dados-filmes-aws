name: "Develop → Release PR"

on:
  pull_request:
    types: [closed]
    branches:
      - develop

permissions:
  contents: write
  pull-requests: write

jobs:
  promote:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create PR develop → release
        run: |
          export BASE=release
          export HEAD=develop
          PR_NUMBER=$(gh pr list --base "$BASE" --head "$HEAD" --json number --jq '.[0].number // ""')
          if [ -z "$PR_NUMBER" ]; then
            gh pr create --base "$BASE" --head "$HEAD" --title "Auto PR: $HEAD → $BASE" --body "Promoção automática."
          else
            gh pr edit "$PR_NUMBER" --title "Auto PR: $HEAD → $BASE" --body "Promoção automática."
            echo "PR já existente: #$PR_NUMBER"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}