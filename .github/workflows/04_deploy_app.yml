name: Deploy Generic App

on:
  workflow_call:
    inputs:
      app_type:
        required: true
        type: string
      environment:
        required: true
        type: string
    secrets:
      AWS_ASSUME_ROLE_ARN:
        required: true
      AWS_REGION:
        required: true
      AWS_ARTIFACTS_S3_BUCKET:
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ASSUME_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy
        run: |
          BUCKET="${{ secrets.AWS_ARTIFACTS_S3_BUCKET }}"
          REPO="${GITHUB_REPOSITORY##*/}"
          ENV="${{ inputs.environment }}"
          TYPE="${{ inputs.app_type }}"

          BASE_PATH="s3://$BUCKET/$TYPE/$REPO/$ENV/"

          case "$TYPE" in
            glue)
              SCRIPT_PATH="$BASE_PATH/script.py"
              JOB_NAME=$(grep glue_job_name infra/envs/$ENV/terraform.tfvars | cut -d '"' -f2)

              ROLE=$(aws glue get-job --job-name "$JOB_NAME" --query 'Job.Role' --output text)

              aws glue update-job \
                --job-name "$JOB_NAME" \
                --job-update "{\"Role\":\"$ROLE\",\"Command\":{\"Name\":\"glueetl\",\"ScriptLocation\":\"$SCRIPT_PATH\"}}"
              ;;

            lambda)
              FUNCTION_NAME=$(grep lambda_name infra/envs/$ENV/terraform.tfvars | cut -d '"' -f2)

              aws s3 cp "$BASE_PATH/lambda.zip" lambda.zip

              aws lambda update-function-code \
                --function-name "$FUNCTION_NAME" \
                --zip-file fileb://lambda.zip
              ;;

            *)
              echo "Unsupported app_type"
              exit 1
              ;;
          esac
