name: "Feature → Develop PR"

on:
  push:
    branches:
      - 'feature/**'

permissions:
  contents: write
  pull-requests: write

jobs:
  validate-and-create-pr:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # (Opcional) Rodar Terraform validate
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Validate
        run: cd infra && terraform init -backend=false && terraform validate

      # ✅ Criar PR somente se tudo deu certo
      - name: Create PR to develop
        run: |
          gh pr create \
            --base develop \
            --head ${{ github.ref_name }} \
            --title "Auto PR: ${{ github.ref_name }} → develop" \
            --body "PR criado automaticamente após validação."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}