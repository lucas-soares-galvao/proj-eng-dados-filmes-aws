name: "Feature → Develop PR"

on:
  push:
    branches:
      - 'feature/**'

permissions:
  contents: write
  pull-requests: write

jobs:
  validate-and-create-pr:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Validate
        run: cd infra && terraform init -backend=false && terraform validate

      - name: Create PR to develop (safe)
        run: |
          echo "Verificando se já existe PR aberto feature → develop..."

          EXISTING_PR=$(gh pr list \
            --base develop \
            --head ${{ github.ref_name }} \
            --state open \
            --json number \
            --jq '.[0].number')

          if [ -z "$EXISTING_PR" ]; then
            echo "Criando PR..."

            gh pr create \
              --base develop \
              --head ${{ github.ref_name }} \
              --title "Auto PR: ${{ github.ref_name }} → develop" \
              --body "PR criado automaticamente após validação\n\nBranch: ${{ github.ref_name }}\nAutor: ${{ github.actor }}"
          else
            echo "PR já existe: #$EXISTING_PR"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}