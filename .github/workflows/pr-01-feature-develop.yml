name: "Feature → Develop PR"

on:
  push:
    branches:
      - 'feature/**'

permissions:
  contents: write
  pull-requests: write

jobs:
  validate-and-create-pr:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # (Opcional) Rodar Terraform validate
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Validate
        run: cd infra && terraform init -backend=false && terraform validate

      - name: Create PR feature → develop
        run: |
          export BASE=develop
          export HEAD="${{ github.ref_name }}"
          PR_NUMBER=$(gh pr list --base "$BASE" --head "$HEAD" --json number --jq '.[0].number // ""')
          if [ -z "$PR_NUMBER" ]; then
            gh pr create --base "$BASE" --head "$HEAD" --title "Auto PR: $HEAD → $BASE" --body "PR criado automaticamente após validação."
          else
            gh pr edit "$PR_NUMBER" --title "Auto PR: $HEAD → $BASE" --body "PR criado automaticamente após validação."
            echo "PR já existente: #$PR_NUMBER"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}