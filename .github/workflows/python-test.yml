name: Test Python

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - feature/*
      - develop
      - release
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r test/requirements_test.txt
          pip install -e app   # ou -e . se setup.py/pyproject estiver no root

      - name: Run tests
        run: |
          PYTHONPATH=app pytest -q