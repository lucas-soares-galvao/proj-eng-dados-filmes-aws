# Nome do workflow para deploy da aplicação Glue
name: "Deploy Glue ETL Job"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Ambiente de deploy (dev, hom, prod)'
        required: false
        default: 'dev'
      glue_job_name:
        description: 'Nome do job Glue a ser atualizado'
        required: false
      glue_script_s3_bucket:
        description: 'Bucket S3 onde o script Glue será publicado'
        required: false
      glue_script_s3_key_prefix:
        description: 'Prefixo S3 para o script Glue (ex: glue/etl-processor)'
        required: false
  workflow_call:
    inputs:
      environment:
        type: string
        required: false
        default: 'dev'
      glue_job_name:
        type: string
        required: false
      glue_script_s3_bucket:
        type: string
        required: false
      glue_script_s3_key_prefix:
        type: string
        required: false
    secrets:
      aws-assume-role-arn:
        required: true
      aws-region:
        required: true
      aws-artifacts-s3-bucket:
        required: true

permissions:
  id-token: write
  contents: read
  actions: read

env:
  PYTHON_VERSION: '3.12'

jobs:
  deploy-app:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine deployment environment
        id: determine-env
        run: |
          echo "EVENT_NAME=${GITHUB_EVENT_NAME}"
          if [ "${GITHUB_EVENT_NAME}" = "workflow_run" ]; then
            BRANCH_NAME="${{ github.event.workflow_run.head_branch }}"
          elif [ "${GITHUB_EVENT_NAME}" = "push" ]; then
            BRANCH_NAME="${GITHUB_REF_NAME}"
          else
            BRANCH_NAME="${{ github.event.inputs.environment }}"
          fi

          if [ -z "$BRANCH_NAME" ] || [ "$BRANCH_NAME" = "null" ]; then
            BRANCH_NAME="${{ github.event.inputs.environment }}"
          fi

          case "$BRANCH_NAME" in
            develop) ENV=dev ;;
            release) ENV=hom ;;
            main) ENV=prod ;;
            dev|hom|prod) ENV="$BRANCH_NAME" ;;
            *) ENV="${{ github.event.inputs.environment }}" ;;
          esac

          if [ -z "$ENV" ]; then
            echo "ERRO: não foi possível determinar o ambiente de deploy. Informe 'environment' ou use branch develop/release/main."
            exit 1
          fi

          echo "environment=$ENV" >> $GITHUB_OUTPUT
          echo "branch=$BRANCH_NAME" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ASSUME_ROLE_ARN }}
          role-session-name: GitHub_to_AWS_via_FederatedOIDC
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Determine deployment targets
        id: determine-targets
        run: |
          ENV="${{ steps.determine-env.outputs.environment }}"
          echo "ENVIRONMENT=$ENV"

          # Glue job de env input ou do Terraform tfvars por ambiente
          if [ -n "${{ github.event.inputs.glue_job_name }}" ]; then
            GLUE_JOB_NAME="${{ github.event.inputs.glue_job_name }}"
          else
            TFVARS_FILE="infra/envs/${ENV}/terraform.tfvars"
            if [ ! -f "$TFVARS_FILE" ]; then
              echo "ERRO: arquivo Terraform tfvars não encontrado: $TFVARS_FILE"
              exit 1
            fi

            GLUE_JOB_NAME="$(grep -E '^[[:space:]]*glue_job_name[[:space:]]*=' "$TFVARS_FILE" | head -n 1 | sed -E 's/^[[:space:]]*glue_job_name[[:space:]]*=[[:space:]]*"([^"]+)".*$/\1/')"

            if [ -z "$GLUE_JOB_NAME" ]; then
              echo "ERRO: glue_job_name não encontrado em $TFVARS_FILE"
              exit 1
            fi
          fi

          # Bucket de artifacts para deploy
          ARTIFACT_BUCKET="${{ secrets.aws-artifacts-s3-bucket }}"

          # Prefixo do script Glue se fornecido
          GLUE_SCRIPT_S3_BUCKET="${{ github.event.inputs.glue_script_s3_bucket }}"
          GLUE_SCRIPT_S3_KEY_PREFIX="${{ github.event.inputs.glue_script_s3_key_prefix }}"

          echo "glue_job_name=$GLUE_JOB_NAME" >> $GITHUB_OUTPUT
          echo "artifact_bucket=$ARTIFACT_BUCKET" >> $GITHUB_OUTPUT
          echo "glue_script_s3_bucket=$GLUE_SCRIPT_S3_BUCKET" >> $GITHUB_OUTPUT
          echo "glue_script_s3_key_prefix=$GLUE_SCRIPT_S3_KEY_PREFIX" >> $GITHUB_OUTPUT

      - name: Fetch build artifacts from S3
        run: |
          ENV="${{ steps.determine-env.outputs.environment }}"
          BUCKET="${{ steps.determine-targets.outputs.artifact_bucket }}"
          REPO_NAME="${GITHUB_REPOSITORY##*/}"
          PREFIX="artifacts/${REPO_NAME}/${ENV}/"
          mkdir -p artifacts

          echo "📦 Baixando artifacts do S3: s3://$BUCKET/$PREFIX"
          aws s3 ls "s3://$BUCKET/$PREFIX" || {
            echo "ERRO: Não foi possível listar artifacts em s3://$BUCKET/$PREFIX"
            exit 1
          }

          aws s3 cp "s3://$BUCKET/$PREFIX" artifacts/ --recursive || {
            echo "ERRO: Falha ao baixar artifacts do S3"
            exit 1
          }

          echo "✓ Artifacts baixados para artifacts/"
          ls -lh artifacts || true

      - name: Deploy Glue Job
        if: ${{ steps.determine-targets.outputs.glue_job_name != '' }}
        run: |
          ENV="${{ steps.determine-env.outputs.environment }}"
          GLUE_JOB="${{ steps.determine-targets.outputs.glue_job_name }}"
          BUCKET="${{ steps.determine-targets.outputs.artifact_bucket }}"
          REPO_NAME="${GITHUB_REPOSITORY##*/}"
          SCRIPT_KEY="glue/${REPO_NAME}/${ENV}/script.py"
          S3_URI="s3://$BUCKET/$SCRIPT_KEY"

          # Verificar se o script existe no S3
          if ! aws s3 ls "$S3_URI" > /dev/null 2>&1; then
            echo "ERRO: Script Glue não encontrado em: $S3_URI"
            echo "Certifique-se de que o workflow de build foi executado com sucesso."
            exit 1
          fi

          echo "🔁 Atualizando Glue Job: $GLUE_JOB"
          aws glue update-job \
            --job-name "$GLUE_JOB" \
            --job-update "{\"Command\":{\"Name\":\"glueetl\",\"ScriptLocation\":\"${S3_URI}\"}}"

          echo "✓ Deploy Glue concluído para $GLUE_JOB"

      - name: Deployment summary
        run: |
          echo "=========================================="
          echo "Deploy Glue ETL concluído"
          echo "Environment: ${{ steps.determine-env.outputs.environment }}"
          echo "Glue job: ${{ steps.determine-targets.outputs.glue_job_name }}"
          echo "Artifacts source bucket: ${{ steps.determine-targets.outputs.artifact_bucket }}"
          echo "=========================================="