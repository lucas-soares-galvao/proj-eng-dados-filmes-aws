name: 5. Backfill

# =============================================================================
# Executa backfills pontuais sob demanda no ambiente prod.
#
# Grupos de tabelas disponíveis:
#   - discover              — gaps de anos via Lambda (ETL → DQ → Details → AGG)
#   - referencias           — genre, configuration, watch_providers_ref via Lambda
#   - detalhes_e_providers  — re-enriquece details + watch_providers via Glue Details
#   - data_quality          — re-executa DQ via Glue
#   - traducao              — adiciona title_pt/overview_pt nos details (sem API TMDB)
#
# Todas as variáveis de ambiente dos recursos AWS são derivadas automaticamente
# do padrão de nomenclatura do Terraform (tmdb-*-prod / db_tmdb_*_prod / etc.).
# =============================================================================

on:
  workflow_dispatch:
    inputs:
      table_group:
        description: "Grupo de tabelas a atualizar"
        required: true
        type: choice
        options:
          - discover
          - referencias
          - detalhes_e_providers
          - data_quality
          - traducao
      start_year:
        description: "Ano inicial (ignorado para referencias)"
        required: true
        default: "2000"
        type: string
      end_year:
        description: "Ano final (vazio = ano atual; ignorado para referencias)"
        required: false
        default: ""
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ASSUME_ROLE_ARN_PROD }}
          role-session-name: GitHub_to_AWS_Backfill
          aws-region: sa-east-1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: |
          pip install boto3
          if [ "${{ inputs.table_group }}" = "traducao" ]; then
            pip install -r scripts/requirements_backfill.txt
          fi

      - name: Executar backfill (${{ inputs.table_group }})
        env:
          AWS_REGION: sa-east-1
          FORCE_REFETCH: "true"

          # Jobs
          GLUE_DETAILS_JOB_NAME: tmdb-glue-details-prod
          GLUE_DATA_QUALITY_JOB_NAME: tmdb-glue-data-quality-prod
          LAMBDA_FUNCTION_NAME: tmdb-lambda-api-prod

          # Databases
          GLUE_DATABASE_MOVIE: db_tmdb_movie_prod
          GLUE_DATABASE_TV: db_tmdb_tv_prod
          GLUE_DATABASE_UNIFIED: db_tmdb_unified_prod

          # Buckets
          S3_BUCKET_SOT: lsg-sa-east-1-bucket-sot-prod

          # Tabelas
          TABLE_DISCOVER_MOVIE: tb_tmdb_discover_movie_prod
          TABLE_DISCOVER_TV: tb_tmdb_discover_tv_prod
          TABLE_GENRE_MOVIE: tb_tmdb_genre_movie_prod
          TABLE_GENRE_TV: tb_tmdb_genre_tv_prod
          TABLE_CONFIGURATION_LANGUAGES: tb_tmdb_configuration_languages_prod
          TABLE_CONFIGURATION_COUNTRIES: tb_tmdb_configuration_countries_prod
          TABLE_DETAILS_MOVIE: tb_tmdb_details_movie_prod
          TABLE_DETAILS_TV: tb_tmdb_details_tv_prod
          TABLE_WATCH_PROVIDERS_MOVIE: tb_tmdb_watch_providers_movie_prod
          TABLE_WATCH_PROVIDERS_TV: tb_tmdb_watch_providers_tv_prod
          TABLE_WATCH_PROVIDERS_REF_MOVIE: tb_tmdb_watch_providers_ref_movie_prod
          TABLE_WATCH_PROVIDERS_REF_TV: tb_tmdb_watch_providers_ref_tv_prod
          BACKFILL_START_YEAR: ${{ inputs.start_year }}
        run: |
          if [ -n "${{ inputs.end_year }}" ]; then
            export BACKFILL_END_YEAR="${{ inputs.end_year }}"
          fi
          case "${{ inputs.table_group }}" in
            discover)             python scripts/backfill_historico.py ;;
            referencias)          python scripts/backfill_referencias.py ;;
            detalhes_e_providers) python scripts/backfill_enriquecimento.py ;;
            data_quality)         python scripts/backfill_data_quality.py ;;
            traducao)             python scripts/backfill_traducao.py ;;
          esac
